apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: mall
  labels:
    app: search-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
        - name: search-service
          image: mall/search-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8093
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: jwt-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8093
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8093
            initialDelaySeconds: 30
            periodSeconds: 10
