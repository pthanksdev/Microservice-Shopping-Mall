---
# API Gateway — LoadBalancer (external entry point)
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: mall
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer

---
