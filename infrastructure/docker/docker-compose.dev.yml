version: "3.9"

# =============================================================
#  Shopping Mall — Dev Override (hot-reload + debug ports)
#  Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# =============================================================

services:

  api-gateway:
    build:
      context: ../../backend/api-gateway
      target: dev
    volumes:
      - ../../backend/api-gateway/src:/app/src
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5080"
    ports:
      - "5080:5080"   # JDWP debug port

  user-service:
    volumes:
      - ../../backend/user-service/src:/app/src
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5081"
    ports:
