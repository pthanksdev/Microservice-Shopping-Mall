      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mall_payments
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    ports:
      - "8084:8084"
    networks:
      - mall-net
