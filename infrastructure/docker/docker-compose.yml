# =============================================================
#  Shopping Mall — Full Local Dev Stack
#  Usage: docker-compose up --build
# =============================================================

networks:
  mall-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:
  kafka_data:
  zookeeper_data:

# ─── Environment Configuration Templates ──────────────────────

x-common-env: &common-env
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  REDIS_HOST: redis
  REDIS_PORT: 6379
  ZIPKIN_BASE_URL: http://zipkin:9411
  JWT_SECRET: ${JWT_SECRET:-152bbaa8eb3e236d826c1350ad3766a8107eb5c4361c06d8b90cc53e9df0c344}
  JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
  JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}

# Chained anchor: Inherits common settings and adds Database configurations
x-db-env: &db-env
  <<: *common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_USER: ${POSTGRES_USER:-mall_admin}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-m@ll2dm1nsh0p}

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 60s

services:

  # ─── Infrastructure ─────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: mall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mall_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-m@ll2dm1nsh0p}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - mall-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mall_admin}"]
      <<: *healthcheck-defaults

  redis:
    image: redis:7-alpine
    container_name: mall-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - mall-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *healthcheck-defaults

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: mall-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - mall-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      <<: *healthcheck-defaults

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mall-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    networks:
      - mall-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      <<: *healthcheck-defaults

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: mall-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - mall-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      <<: *healthcheck-defaults

  minio:
    image: minio/minio:latest
    container_name: mall-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - mall-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      <<: *healthcheck-defaults

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: mall-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - mall-net

  # ─── Microservices ──────────────────────────────────────────

  api-gateway:
    build:
      context: ../../backend
      dockerfile: api-gateway/Dockerfile
    container_name: mall-api-gateway
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      SERVER_PORT: 8080
      USER_SERVICE_URL: http://user-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8084
      VENDOR_SERVICE_URL: http://vendor-service:8085
      INVENTORY_SERVICE_URL: http://inventory-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      SHIPPING_SERVICE_URL: http://shipping-service:8088
      REVIEW_SERVICE_URL: http://review-service:8089
      DISCOUNT_SERVICE_URL: http://discount-service:8090
      WISHLIST_SERVICE_URL: http://wishlist-service:8091
      ADMIN_SERVICE_URL: http://admin-service:8092
      SEARCH_SERVICE_URL: http://search-service:8093
      MEDIA_SERVICE_URL: http://media-service:8094
    ports:
      - "8080:8080"
    networks:
      - mall-net

  user-service:
    build:
      context: ../../backend
      dockerfile: user-service/Dockerfile
    container_name: mall-user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *db-env
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mall_users
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    ports:
      - "8081:8081"
    networks:
      - mall-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      <<: *healthcheck-defaults

  product-service:
    build:
      context: ../../backend
      dockerfile: product-service/Dockerfile
    container_name: mall-product-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *db-env
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mall_products
    ports:
      - "8082:8082"
    networks:
      - mall-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      <<: *healthcheck-defaults

  order-service:
